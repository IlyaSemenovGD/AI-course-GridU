version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datagen}
      POSTGRES_USER: ${POSTGRES_USER:-datagen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datagen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datagen} -d ${POSTGRES_DB:-datagen}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    # Mount gcloud ADC credentials for Vertex AI auth
    volumes:
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro

volumes:
  postgres_data:
